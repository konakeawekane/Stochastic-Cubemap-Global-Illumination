<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deferred PBR & Stochastic Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 100; max-width: 400px;
        }
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            cursor: pointer; z-index: 200;
        }
        h1 { margin: 0 0 10px 0; font-size: 20px; }
        p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .lil-gui { z-index: 250 !important; }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- RGBELoader for HDRI -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <!-- lil-gui for UI Controls -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.18"></script>
    <!-- Cannon.js for Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1>Deferred PBR + SSGI</h1>
        <p>FPS: <span id="fps">0</span></p>
        <p>Wall Avoidance & Probe SSR Active</p>
    </div>
    <div id="blocker">
        <h1>Click to Start</h1>
        <p>WASD to Move | Q/E for Up/Down | Mouse to Look</p>
        <p>Press F to spawn Physics Spheres</p>
        <p>Press ESC to unlock and use Settings</p>
    </div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
